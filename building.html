<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Hurlers – Building Illustration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px;
    }
    svg { max-width: 100%; height: auto; }
  </style>
</head>
<body>

<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Stone wall pattern -->
    <pattern id="stone" x="0" y="0" width="54" height="18" patternUnits="userSpaceOnUse">
      <rect width="54" height="18" fill="#b0ada4"/>
      <rect x="1"  y="1"  width="24" height="7.5" fill="#bab7ae" stroke="#989490" stroke-width="0.6"/>
      <rect x="27" y="1"  width="26" height="7.5" fill="#b6b3aa" stroke="#989490" stroke-width="0.6"/>
      <rect x="1"  y="10" width="13" height="7.5" fill="#bcb9b0" stroke="#989490" stroke-width="0.6"/>
      <rect x="16" y="10" width="25" height="7.5" fill="#b2afa6" stroke="#989490" stroke-width="0.6"/>
      <rect x="43" y="10" width="10" height="7.5" fill="#b8b5ac" stroke="#989490" stroke-width="0.6"/>
    </pattern>

    <!-- Slate roof pattern -->
    <pattern id="slate" x="0" y="0" width="26" height="15" patternUnits="userSpaceOnUse">
      <rect width="26" height="15" fill="#575450"/>
      <rect x="1"  y="1"   width="11" height="6" fill="#626260" stroke="#424040" stroke-width="0.5"/>
      <rect x="14" y="1"   width="11" height="6" fill="#5e5c5a" stroke="#424040" stroke-width="0.5"/>
      <rect x="7"  y="8"   width="11" height="6" fill="#5c5a58" stroke="#424040" stroke-width="0.5"/>
      <rect x="20" y="8"   width="6"  height="6" fill="#5a5856" stroke="#424040" stroke-width="0.5"/>
      <rect x="1"  y="8"   width="5"  height="6" fill="#5a5856" stroke="#424040" stroke-width="0.5"/>
    </pattern>

    <!-- Thatch pattern -->
    <pattern id="thatch" x="0" y="0" width="20" height="9" patternUnits="userSpaceOnUse">
      <rect width="20" height="9" fill="#9e7c2c"/>
      <line x1="0" y1="4.5" x2="20" y2="4.5" stroke="#896820" stroke-width="1.8"/>
      <line x1="0" y1="0"   x2="20" y2="0"   stroke="#7a5e1c" stroke-width="0.9"/>
      <line x1="0" y1="9"   x2="20" y2="9"   stroke="#7a5e1c" stroke-width="0.9"/>
      <line x1="5"  y1="0"  x2="0"  y2="9"   stroke="#6a5018" stroke-width="0.7" opacity="0.4"/>
      <line x1="14" y1="0"  x2="9"  y2="9"   stroke="#6a5018" stroke-width="0.7" opacity="0.4"/>
    </pattern>

    <!-- Clip path for gabled roof -->
    <clipPath id="roofClip">
      <polygon points="62,122 205,44 348,122"/>
    </clipPath>

  </defs>

  <!-- ===================================================
       GROUND
  ==================================================== -->
  <rect x="52" y="310" width="696" height="52" rx="4" fill="#c4c1b6"/>
  <rect x="52" y="310" width="696" height="9"  rx="4" fill="#d2cfc4"/>
  <rect x="52" y="355" width="696" height="7"  rx="4" fill="#b8b5aa"/>

  <!-- ===================================================
       STONE BUILDING (LEFT)
  ==================================================== -->

  <!-- Stone walls -->
  <rect x="80" y="122" width="256" height="188" fill="url(#stone)"/>
  <!-- Wall outline -->
  <rect x="80" y="122" width="256" height="188" fill="none" stroke="#8a8880" stroke-width="1.2"/>

  <!-- Gabled roof – slate pattern clipped to triangle -->
  <polygon points="62,122 205,44 348,122" fill="url(#slate)" clip-path="url(#roofClip)"/>
  <!-- Roof outline -->
  <polyline points="62,122 205,44 348,122" fill="none" stroke="#353230" stroke-width="2"/>
  <!-- Roof ridge line -->
  <line x1="62" y1="122" x2="348" y2="122" stroke="#5a5856" stroke-width="1.2"/>

  <!-- Chimney 1 -->
  <rect x="128" y="30" width="21" height="38" fill="#a8a5a0" stroke="#8a8884" stroke-width="0.8"/>
  <rect x="125" y="26" width="27" height="7"  fill="#8a8880" stroke="#767472" stroke-width="0.8"/>

  <!-- Chimney 2 -->
  <rect x="258" y="22" width="22" height="46" fill="#a6a39e" stroke="#8a8884" stroke-width="0.8"/>
  <rect x="255" y="18" width="28" height="7"  fill="#8a8880" stroke="#767472" stroke-width="0.8"/>

  <!-- Chimney 3 -->
  <rect x="298" y="28" width="18" height="40" fill="#a6a39e" stroke="#8a8884" stroke-width="0.8"/>
  <rect x="295" y="24" width="24" height="7"  fill="#8a8880" stroke="#767472" stroke-width="0.8"/>

  <!-- UPPER FLOOR WINDOWS (3) -->
  <!-- U1 -->
  <rect x="100" y="147" width="48" height="54" fill="#7c3e28" rx="1"/>
  <rect x="103" y="150" width="19" height="48" fill="#b8cace"/>
  <rect x="126" y="150" width="19" height="48" fill="#b4c6ca"/>
  <line x1="112" y1="150" x2="112" y2="198" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="103" y1="174" x2="122" y2="174" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="126" y1="174" x2="145" y2="174" stroke="#8a5a3a" stroke-width="0.8"/>
  <!-- U2 -->
  <rect x="164" y="147" width="48" height="54" fill="#7c3e28" rx="1"/>
  <rect x="167" y="150" width="19" height="48" fill="#b8cace"/>
  <rect x="190" y="150" width="19" height="48" fill="#b4c6ca"/>
  <line x1="176" y1="150" x2="176" y2="198" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="167" y1="174" x2="186" y2="174" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="190" y1="174" x2="209" y2="174" stroke="#8a5a3a" stroke-width="0.8"/>
  <!-- U3 -->
  <rect x="228" y="147" width="48" height="54" fill="#7c3e28" rx="1"/>
  <rect x="231" y="150" width="19" height="48" fill="#b8cace"/>
  <rect x="254" y="150" width="19" height="48" fill="#b4c6ca"/>
  <line x1="240" y1="150" x2="240" y2="198" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="231" y1="174" x2="250" y2="174" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="254" y1="174" x2="273" y2="174" stroke="#8a5a3a" stroke-width="0.8"/>

  <!-- LOWER FLOOR WINDOWS (3) -->
  <!-- L1 -->
  <rect x="100" y="218" width="48" height="58" fill="#7c3e28" rx="1"/>
  <rect x="103" y="221" width="19" height="52" fill="#b8cace"/>
  <rect x="126" y="221" width="19" height="52" fill="#b4c6ca"/>
  <line x1="112" y1="221" x2="112" y2="273" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="103" y1="247" x2="122" y2="247" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="126" y1="247" x2="145" y2="247" stroke="#8a5a3a" stroke-width="0.8"/>
  <!-- L2 -->
  <rect x="164" y="218" width="48" height="58" fill="#7c3e28" rx="1"/>
  <rect x="167" y="221" width="19" height="52" fill="#b8cace"/>
  <rect x="190" y="221" width="19" height="52" fill="#b4c6ca"/>
  <line x1="176" y1="221" x2="176" y2="273" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="167" y1="247" x2="186" y2="247" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="190" y1="247" x2="209" y2="247" stroke="#8a5a3a" stroke-width="0.8"/>
  <!-- L3 -->
  <rect x="228" y="218" width="48" height="58" fill="#7c3e28" rx="1"/>
  <rect x="231" y="221" width="19" height="52" fill="#b8cace"/>
  <rect x="254" y="221" width="19" height="52" fill="#b4c6ca"/>
  <line x1="240" y1="221" x2="240" y2="273" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="231" y1="247" x2="250" y2="247" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="254" y1="247" x2="273" y2="247" stroke="#8a5a3a" stroke-width="0.8"/>

  <!-- PLANTERS – stone building -->
  <rect x="82"  y="282" width="75" height="28" fill="#5c3216" rx="2" stroke="#4a2810" stroke-width="0.8"/>
  <rect x="82"  y="279" width="75" height="7"  fill="#6c3c1e" rx="1"/>
  <!-- plank lines -->
  <line x1="107" y1="282" x2="107" y2="310" stroke="#4a2810" stroke-width="0.7"/>
  <line x1="132" y1="282" x2="132" y2="310" stroke="#4a2810" stroke-width="0.7"/>
  <!-- plants -->
  <ellipse cx="97"  cy="277" rx="9"  ry="12" fill="#2e6420"/>
  <ellipse cx="119" cy="273" rx="13" ry="16" fill="#266018"/>
  <ellipse cx="143" cy="277" rx="9"  ry="12" fill="#2e6420"/>

  <rect x="171" y="282" width="75" height="28" fill="#5c3216" rx="2" stroke="#4a2810" stroke-width="0.8"/>
  <rect x="171" y="279" width="75" height="7"  fill="#6c3c1e" rx="1"/>
  <line x1="196" y1="282" x2="196" y2="310" stroke="#4a2810" stroke-width="0.7"/>
  <line x1="221" y1="282" x2="221" y2="310" stroke="#4a2810" stroke-width="0.7"/>
  <ellipse cx="186" cy="277" rx="9"  ry="12" fill="#2e6420"/>
  <ellipse cx="208" cy="273" rx="13" ry="16" fill="#266018"/>
  <ellipse cx="232" cy="277" rx="9"  ry="12" fill="#2e6420"/>

  <!-- Topiary shrub between buildings -->
  <rect x="314" y="292" width="12" height="18" fill="#5c3216"/>
  <ellipse cx="320" cy="286" rx="17" ry="16" fill="#246018"/>
  <ellipse cx="320" cy="283" rx="14" ry="13" fill="#2e6c20"/>
  <ellipse cx="312" cy="287" rx="7"  ry="7"  fill="#266018"/>
  <ellipse cx="328" cy="285" rx="8"  ry="8"  fill="#246018"/>

  <!-- ===================================================
       THATCHED COTTAGE (RIGHT)
  ==================================================== -->

  <!-- White walls -->
  <rect x="340" y="178" width="358" height="132" fill="#edead8" stroke="#d0ccbe" stroke-width="1"/>

  <!-- Thatched roof body -->
  <rect x="323" y="145" width="392" height="46" fill="url(#thatch)"/>
  <!-- Eave fascia -->
  <rect x="318" y="164" width="402" height="20" fill="#8a6a1e"/>
  <!-- Eave underside shadow -->
  <rect x="318" y="182" width="402" height="10" fill="rgba(0,0,0,0.14)"/>
  <!-- Ridge cap -->
  <rect x="323" y="138" width="392" height="12" fill="#7a5c18" rx="1"/>
  <rect x="323" y="136" width="392" height="5"  fill="#6a4e14" rx="1"/>

  <!-- Cottage chimney -->
  <rect x="626" y="104" width="24" height="46" fill="#ccc9be" stroke="#b4b1a6" stroke-width="0.8"/>
  <rect x="622" y="100" width="32" height="8"  fill="#bcb9ae" stroke="#a4a19a" stroke-width="0.8"/>

  <!-- WINDOWS on cottage -->
  <!-- CW1 left -->
  <rect x="360" y="195" width="54" height="60" fill="#7c3e28" rx="1"/>
  <rect x="363" y="198" width="22" height="54" fill="#b4ccd0"/>
  <rect x="389" y="198" width="21" height="54" fill="#b0c8cc"/>
  <line x1="374" y1="198" x2="374" y2="252" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="363" y1="225" x2="385" y2="225" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="389" y1="225" x2="410" y2="225" stroke="#8a5a3a" stroke-width="0.8"/>
  <!-- Hanging basket CW1 -->
  <path d="M364,195 Q387,184 410,195" fill="none" stroke="#5c4018" stroke-width="1.2"/>
  <ellipse cx="387" cy="185" rx="13" ry="8"  fill="#3a7830"/>
  <ellipse cx="370" cy="189" rx="8"  ry="5"  fill="#307028"/>
  <ellipse cx="404" cy="188" rx="8"  ry="5"  fill="#307028"/>

  <!-- CW2 middle -->
  <rect x="444" y="195" width="54" height="60" fill="#7c3e28" rx="1"/>
  <rect x="447" y="198" width="22" height="54" fill="#b4ccd0"/>
  <rect x="473" y="198" width="21" height="54" fill="#b0c8cc"/>
  <line x1="458" y1="198" x2="458" y2="252" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="447" y1="225" x2="469" y2="225" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="473" y1="225" x2="494" y2="225" stroke="#8a5a3a" stroke-width="0.8"/>
  <!-- Hanging basket CW2 -->
  <path d="M448,195 Q471,184 494,195" fill="none" stroke="#5c4018" stroke-width="1.2"/>
  <ellipse cx="471" cy="185" rx="13" ry="8"  fill="#3a7830"/>
  <ellipse cx="454" cy="189" rx="8"  ry="5"  fill="#307028"/>
  <ellipse cx="488" cy="188" rx="8"  ry="5"  fill="#307028"/>

  <!-- Red/pink door -->
  <rect x="520" y="208" width="46" height="102" fill="#c44040" rx="2" stroke="#a83030" stroke-width="1"/>
  <rect x="524" y="213" width="17" height="38" fill="#ce4848" rx="1"/>
  <rect x="545" y="213" width="17" height="38" fill="#ce4848" rx="1"/>
  <rect x="524" y="256" width="17" height="51" fill="#ce4848" rx="1"/>
  <rect x="545" y="256" width="17" height="51" fill="#ce4848" rx="1"/>
  <rect x="524" y="251" width="38" height="5" fill="#a83030"/>
  <circle cx="541" cy="262" r="4" fill="#c09030" stroke="#a07820" stroke-width="0.8"/>
  <!-- Door top fanlight -->
  <path d="M520,208 Q543,196 566,208" fill="#ce8080" stroke="#a83030" stroke-width="1"/>

  <!-- Porch / veranda on right -->
  <rect x="578" y="178" width="120" height="132" fill="#e8e4d0" stroke="#d0ccba" stroke-width="1"/>
  <!-- Porch beam -->
  <rect x="575" y="188" width="125" height="12" fill="#9a7838"/>
  <!-- Porch posts -->
  <rect x="575" y="200" width="11" height="110" fill="#9a7838"/>
  <rect x="689" y="200" width="11" height="110" fill="#9a7838"/>
  <!-- Lattice cross pieces -->
  <line x1="578" y1="228" x2="698" y2="228" stroke="#8a6830" stroke-width="3"/>
  <line x1="578" y1="258" x2="698" y2="258" stroke="#8a6830" stroke-width="3"/>
  <!-- Vertical balusters -->
  <line x1="598" y1="200" x2="598" y2="310" stroke="#9a7838" stroke-width="2.5"/>
  <line x1="618" y1="200" x2="618" y2="310" stroke="#9a7838" stroke-width="2.5"/>
  <line x1="638" y1="200" x2="638" y2="310" stroke="#9a7838" stroke-width="2.5"/>
  <line x1="658" y1="200" x2="658" y2="310" stroke="#9a7838" stroke-width="2.5"/>
  <line x1="678" y1="200" x2="678" y2="310" stroke="#9a7838" stroke-width="2.5"/>
  <!-- Porch window -->
  <rect x="596" y="205" width="52" height="55" fill="#7c3e28" rx="1"/>
  <rect x="599" y="208" width="21" height="49" fill="#b4ccd0"/>
  <rect x="624" y="208" width="21" height="49" fill="#b0c8cc"/>
  <line x1="610" y1="208" x2="610" y2="257" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="599" y1="232" x2="620" y2="232" stroke="#8a5a3a" stroke-width="0.8"/>
  <line x1="624" y1="232" x2="645" y2="232" stroke="#8a5a3a" stroke-width="0.8"/>
  <!-- Potted plant on porch -->
  <rect x="683" y="270" width="16" height="40" fill="#5c3216" rx="1"/>
  <rect x="680" y="267" width="22" height="6"  fill="#6c3c1e" rx="1"/>
  <ellipse cx="691" cy="262" rx="14" ry="16" fill="#266018"/>
  <ellipse cx="691" cy="258" rx="10" ry="12" fill="#2e6c20"/>

  <!-- PLANTERS – cottage left -->

  <ellipse cx="360" cy="277" rx="10" ry="13" fill="#2e6420"/>
  <ellipse cx="383" cy="273" rx="14" ry="17" fill="#266018"/>
  <ellipse cx="408" cy="277" rx="10" ry="13" fill="#2e6420"/>

  <!-- PLANTERS – cottage right -->
  <rect x="570" y="282" width="80" height="28" fill="#5c3216" rx="2" stroke="#4a2810" stroke-width="0.8"/>
  <rect x="570" y="279" width="80" height="7"  fill="#6c3c1e" rx="1"/>

  <ellipse cx="587" cy="277" rx="10" ry="13" fill="#2e6420"/>
  <ellipse cx="610" cy="273" rx="14" ry="17" fill="#266018"/>
  <ellipse cx="635" cy="277" rx="10" ry="13" fill="#2e6420"/>

</svg>
